<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLRIT HACK — Cinematic Experience</title>
  <meta name="description" content="An immersive, scroll-driven cinematic experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0a0a;
      --text:      #f5f0e8;
      --text-dim:  #a89f91;
      --accent:    #e8a04c;
      --accent-glow: rgba(232, 160, 76, 0.45);
      --serif:     'Playfair Display', 'Georgia', serif;
      --mono:      'JetBrains Mono', 'Courier New', monospace;
    }

    html {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;              /* locked until preload done */
      scrollbar-width: none;
    }
    html.ready { overflow-y: auto; }
    html::-webkit-scrollbar { display: none; }

    body {
      background: var(--bg);
      cursor: crosshair;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Preloader ───────────────────────────────────────────── */
    #preloader {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #preloader.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }

    #preloader .label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #preloader .bar-track {
      width: min(420px, 70vw);
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    #preloader .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #f0c87a);
      border-radius: 2px;
      transition: width 0.15s ease-out;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    #preloader .pct {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--text);
    }

    /* ── Canvas ──────────────────────────────────────────────── */
    #frame-canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
    }

    /* ── Spacer (creates scroll height for frame scrubbing) ─── */
    #scroll-spacer {
      position: relative;
      z-index: 0;
    }

    /* ── Progress Bar ────────────────────────────────────────── */
    #progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), #f0c87a);
      box-shadow: 0 0 8px var(--accent-glow);
      z-index: 100;
      transition: width 0.05s linear;
    }

    /* ── CTA Reveal Section ──────────────────────────────────── */
    #cta-section {
      position: relative;
      z-index: 50;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 60px 24px;
      background: var(--bg);
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #cta-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #cta-section .overline {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    #cta-section h1 {
      font-family: var(--serif);
      font-weight: 700;
      font-size: clamp(2.4rem, 7vw, 5.5rem);
      line-height: 1.1;
      color: var(--text);
      max-width: 800px;
      margin-bottom: 48px;
    }

    #cta-section .cta-btn {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--accent);
      padding: 14px 40px;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      transition: all 0.4s ease;
    }
    #cta-section .cta-btn:hover {
      box-shadow: 0 0 24px var(--accent-glow), 0 0 60px rgba(232,160,76,0.15);
      background: rgba(232,160,76,0.06);
      color: #fff;
    }
    #cta-section .cta-btn .arrow {
      transition: transform 0.3s ease;
    }
    #cta-section .cta-btn:hover .arrow {
      transform: translateX(4px);
    }

    /* ── Grain overlay (cinematic texture) ────────────────── */
    #grain {
      position: fixed; inset: 0;
      z-index: 90;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px 180px;
    }

    /* ── Scroll hint ─────────────────────────────────────── */
    #scroll-hint {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 95;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #scroll-hint.show { opacity: 1; }
    #scroll-hint.hide { opacity: 0; }

    #scroll-hint .line {
      width: 1px; height: 36px;
      background: var(--text-dim);
      animation: pulse-line 2s ease-in-out infinite;
    }
    #scroll-hint span {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    @keyframes pulse-line {
      0%, 100% { opacity: 0.3; transform: scaleY(0.6); }
      50% { opacity: 1; transform: scaleY(1); }
    }
  </style>
</head>
<body>

  <!-- Preloader -->
  <div id="preloader">
    <div class="label">Loading Experience</div>
    <div class="bar-track">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
    <div class="pct" id="pct-label">0 %</div>
  </div>

  <!-- Film Grain Overlay -->
  <div id="grain"></div>

  <!-- Canvas for frame animation -->
  <canvas id="frame-canvas"></canvas>

  <!-- Scroll spacer — height set by JS -->
  <div id="scroll-spacer"></div>

  <!-- Bottom progress bar -->
  <div id="progress-bar"></div>

  <!-- Scroll hint -->
  <div id="scroll-hint">
    <div class="line"></div>
    <span>Scroll</span>
  </div>

  <!-- CTA Reveal Section -->
  <section id="cta-section">
    <div class="overline">The Experience Awaits</div>
    <h1>Step Into<br/>Something Extraordinary</h1>
    <a href="#" class="cta-btn">
      Enter Site <span class="arrow">→</span>
    </a>
  </section>

  <script>
    (() => {
      /* ── Config ─────────────────────────────────── */
      const FRAME_COUNT  = 192;
      const SCROLL_PX    = 6;            // scroll pixels per frame
      const FRAME_PATH   = i => `frames/ezgif-frame-${String(i).padStart(3,'0')}.jpg`;

      /* ── DOM refs ───────────────────────────────── */
      const canvas      = document.getElementById('frame-canvas');
      const ctx         = canvas.getContext('2d');
      const barFill     = document.getElementById('bar-fill');
      const pctLabel    = document.getElementById('pct-label');
      const preloader   = document.getElementById('preloader');
      const spacer      = document.getElementById('scroll-spacer');
      const progressBar = document.getElementById('progress-bar');
      const ctaSection  = document.getElementById('cta-section');
      const scrollHint  = document.getElementById('scroll-hint');

      /* ── State ──────────────────────────────────── */
      const frames = [];
      let currentFrame = 0;
      let loaded = 0;
      let ready = false;

      /* ── Canvas sizing ──────────────────────────── */
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        if (ready) drawFrame(currentFrame);
      }
      window.addEventListener('resize', resize);
      resize();

      /* ── Draw a frame with "cover" behavior ─────── */
      function drawFrame(index) {
        const img = frames[index];
        if (!img || !img.complete) return;

        const cw = canvas.width, ch = canvas.height;
        const iw = img.naturalWidth, ih = img.naturalHeight;
        const scale = Math.max(cw / iw, ch / ih);
        const dw = iw * scale, dh = ih * scale;
        const dx = (cw - dw) / 2, dy = (ch - dh) / 2;

        ctx.clearRect(0, 0, cw, ch);
        ctx.drawImage(img, dx, dy, dw, dh);
      }

      /* ── Preload all frames ─────────────────────── */
      function preload() {
        for (let i = 1; i <= FRAME_COUNT; i++) {
          const img = new Image();
          img.src = FRAME_PATH(i);
          img.onload = img.onerror = () => {
            loaded++;
            const pct = Math.round((loaded / FRAME_COUNT) * 100);
            barFill.style.width = pct + '%';
            pctLabel.textContent = pct + ' %';
            if (loaded === FRAME_COUNT) onReady();
          };
          frames.push(img);
        }
      }

      /* ── All frames loaded ─────────────────────── */
      function onReady() {
        ready = true;

        /* Set scroll height */
        const scrollHeight = FRAME_COUNT * SCROLL_PX;
        spacer.style.height = (scrollHeight + window.innerHeight) + 'px';

        /* Draw first frame */
        drawFrame(0);

        /* Fade out preloader */
        preloader.classList.add('hidden');
        document.documentElement.classList.add('ready');

        /* Show scroll hint after a beat */
        setTimeout(() => scrollHint.classList.add('show'), 900);

        /* Begin listening */
        window.addEventListener('scroll', onScroll, { passive: true });
        startRenderLoop();
      }

      /* ── Scroll handler ─────────────────────────── */
      let targetFrame = 0;

      function onScroll() {
        const scrollY  = window.scrollY;
        const maxScroll = FRAME_COUNT * SCROLL_PX;

        /* Map scroll to frame index */
        const raw = scrollY / maxScroll;
        const clamped = Math.min(Math.max(raw, 0), 1);
        targetFrame = Math.min(Math.floor(clamped * FRAME_COUNT), FRAME_COUNT - 1);

        /* Progress bar */
        progressBar.style.width = (clamped * 100) + '%';

        /* Hide scroll hint after a small scroll */
        if (scrollY > 80) scrollHint.classList.remove('show');
        else scrollHint.classList.add('show');

        /* CTA reveal */
        if (clamped >= 0.98) {
          ctaSection.classList.add('visible');
        }
      }

      /* ── Render loop for smooth interpolation ──── */
      function startRenderLoop() {
        function tick() {
          if (currentFrame !== targetFrame) {
            /* Lerp towards target for smoothness */
            if (currentFrame < targetFrame) currentFrame++;
            else currentFrame--;
            drawFrame(currentFrame);
          }
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      /* ── Kick off ──────────────────────────────── */
      preload();
    })();
  </script>
</body>
</html>
